name               = "sana-ai-proxy"
main               = "worker.js"
compatibility_date = "2024-09-23"
# nodejs_compat removed — worker uses only standard Web APIs (fetch, atob, URL, etc.)

# ── Environment variables ────────────────────────────────────────────────────
[vars]
RATE_LIMIT_PER_MINUTE = "30"    # per-IP requests per minute
FREE_DAILY_QUOTA      = "5"     # Claude calls/day for free tier users
PREMIUM_DAILY_QUOTA   = "500"   # Claude calls/day for active subscribers

# ── KV namespace ─────────────────────────────────────────────────────────────
# Create once, then paste the returned IDs below:
#
#   wrangler kv namespace create "RATE_KV"
#   wrangler kv namespace create "RATE_KV" --preview
#
[[kv_namespaces]]
binding    = "RATE_KV"
id         = "28ba92327d3d401a9aff6cb036b4a67a"
preview_id = "e980c0f617304713a0da0b49cc1ff1d1"

# ── Secrets (never stored here — set via CLI) ─────────────────────────────────
#
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put APP_SECRET
#
# APP_SECRET must match BackendConfig.appSecret in the iOS app.
# Generate a strong token: python3 -c "import secrets; print(secrets.token_hex(32))"
